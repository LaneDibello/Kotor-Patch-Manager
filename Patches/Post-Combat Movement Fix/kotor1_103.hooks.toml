# Error: The game briefly lets held W/S ramp up, then pushes it back toward 0 before it is strong enough to unlock movement.
# Fix: After the normal delay, check held W/S directly instead of waiting for the input to build up.
[metadata]
target_versions = [
    "9C10E0450A6EECA417E036E3CDE7474FED1F0A92AAB018446D156944DEA91435",
    "761F9466F456A83909036BAEBB5C43167D722387BE66E54617BA20A8C49E9886"
]

[[hooks]]
address = 0x00623B9C
type = "replace"
original_bytes = [0x8B, 0x8E, 0xA0, 0x02, 0x00, 0x00, 0x8B, 0x11, 0xFF, 0x52, 0x1C]
replacement_bytes = [
    0xD9, 0x44, 0x24, 0x14, # fld dword ptr [esp+14h] - raw forward/backward input
    0xD9, 0xE1,             # fabs
    0xD9, 0x44, 0x24, 0x10, # fld dword ptr [esp+10h] - the opposite direction
    0xD9, 0xE1,             # fabs
    0xDB, 0xF1,             # fcomi st(0), st(1)
    0xDA, 0xC1,             # fcmovb st(0), st(1) - keep the larger magnitude
    0xDD, 0xD9              # fstp st(1) - return one value in st(0)
