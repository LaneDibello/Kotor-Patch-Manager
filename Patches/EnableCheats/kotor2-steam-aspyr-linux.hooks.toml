[metadata]
target_versions = ["ED043D21A4578FD1C6F1557F0F72BDE5589BA3572A5B6F1A687ED9FEEAB49AC3"]

# Enable Cheats for KOTOR II native Linux (Aspyr).
#
# This is the first STATIC-hook patch authored for the native Linux ELF, so it
# doubles as the end-to-end validation of KPM's Linux static-hook support: both
# hooks are install-time byte patches to the executable (no runtime module).
#
# Hook 1 - GetCheatsTurnedOn (0x081ce8a4):
#   Every cheat command (givecredits, addexp, whereami, addlevel, ...) calls this
#   and bails if it returns false. Replace the prologue with `mov eax,1; ret` so
#   it always reports cheats enabled, regardless of swkotor2.ini.
#
# Hook 2 - HandleWMCharMessage console gate (0x0819c4ca):
#   The backtick key only opens the console when swkotor2.ini has EnableCheats=1.
#   The gate first null-checks the ini string, then checks atoi(...)==1. Retarget
#   that null-check branch to jump straight into the toggle, so the console opens
#   regardless of the ini value (or its absence); the ini read and atoi become
#   dead code and are never executed.
#
# Known caveat: the console accepts commands and the cheats take effect, but its
# on-screen prompt does not render (a separate known KOTOR II Aspyr issue).

[[hooks]]
address = 0x081ce8a4
type = "static"
# push ebp; push ebx; push edi; push esi; sub esp,0x3c  ->  mov eax,1; ret; nop
original_bytes = [0x55, 0x53, 0x57, 0x56, 0x83, 0xEC, 0x3C]
replacement_bytes = [0xB8, 0x01, 0x00, 0x00, 0x00, 0xC3, 0x90]

[[hooks]]
address = 0x0819c4ca
type = "static"
# jz 0x0819c5b7 (skip toggle when EnableCheats is absent)  ->  jmp 0x0819c4e1 (toggle)
original_bytes = [0x0F, 0x84, 0xE7, 0x00, 0x00, 0x00]
replacement_bytes = [0xE9, 0x12, 0x00, 0x00, 0x00, 0x90]
