[patch]
id = "enable-cheats"
name = "Enable Cheats"
version = "1.0.0"
author = "Synchro"
description = "Test patch. Enables the KOTOR II cheat console without editing swkotor2.ini. It was authored to validate KPM's install-time (STATIC) byte-patching pipeline end to end. Note: the console accepts commands and the cheats take effect, but its on-screen prompt is invisible. That is a separate, known KOTOR II Aspyr rendering issue, not a fault in this patch."

