# KOTOR 2 Steam Aspyr / swkotor2.exe
# Store expensive-item confirmation threshold patch.
#
# Original behavior:
#   Buy confirmation threshold  = player_level * 50, fallback 50
#   Sell confirmation threshold = min(player_level * 50, 250), fallback/cap 250
#
# Patched behavior:
#   Buy confirmation threshold  = 2500
#   Sell confirmation threshold = 2500
#
# 2500 decimal = 0x000009C4 = C4 09 00 00 little-endian.
# File offset for .text addresses in this executable: VA - 0x00400C00.
# Validated SHA-256: 6A522E71631DCEE93467BD2010F3B23D9145326E1E2E89305F13AB104DBBFFEF

# Sell path: make the cap branch unconditional by NOPing jle, so the capped-threshold block is used for all player levels.
[[hooks]]
address = 0x008B62EA
type = "simple"
original_bytes = [0x7E, 0x0C]
replacement_bytes = [0x90, 0x90]

# Sell path: change capped local threshold value from 250 to 2500.
# Original instruction:
#   008B62EC  c7 85 0c ff ff ff fa 00 00 00  mov dword ptr [ebp-0xf4], 0xFA
# Patched instruction:
#   008B62EC  c7 85 0c ff ff ff c4 09 00 00  mov dword ptr [ebp-0xf4], 0x9C4
[[hooks]]
address = 0x008B62F2
type = "simple"
original_bytes = [0xFA, 0x00, 0x00, 0x00]
replacement_bytes = [0xC4, 0x09, 0x00, 0x00]

# Sell path: change no-player fallback/cap threshold from 250 to 2500.
# Original instruction:
#   008B632B  c7 45 e8 fa 00 00 00  mov dword ptr [ebp-0x18], 0xFA
# Patched instruction:
#   008B632B  c7 45 e8 c4 09 00 00  mov dword ptr [ebp-0x18], 0x9C4
[[hooks]]
address = 0x008B632E
type = "simple"
original_bytes = [0xFA, 0x00, 0x00, 0x00]
replacement_bytes = [0xC4, 0x09, 0x00, 0x00]

# Buy path: redirect the no-player fallback branch to the shared fixed-threshold load.
# Original:
#   008B6A43  74 21  je 0x008B6A66
# Patched:
#   008B6A43  74 19  je 0x008B6A5E
[[hooks]]
address = 0x008B6A43
type = "simple"
original_bytes = [0x74, 0x21]
replacement_bytes = [0x74, 0x19]

# Buy path: replace level*50/fallback-50 threshold setup with fixed [ebp-0x18] = 2500.
# Original block:
#   008B6A5E  6b c0 32                 imul eax, eax, 0x32
#   008B6A61  89 45 e8                 mov [ebp-0x18], eax
#   008B6A64  eb 07                    jmp 0x008B6A6D
#   008B6A66  c7 45 e8 32 00 00 00     mov [ebp-0x18], 0x32
# Patched block:
#   008B6A5E  c7 45 e8 c4 09 00 00     mov [ebp-0x18], 0x9C4
#   008B6A65  eb 06                    jmp 0x008B6A6D
#   008B6A67  90 ...                   nops
[[hooks]]
address = 0x008B6A5E
type = "simple"
original_bytes = [0x6B, 0xC0, 0x32, 0x89, 0x45, 0xE8, 0xEB, 0x07, 0xC7, 0x45, 0xE8, 0x32, 0x00, 0x00, 0x00]
replacement_bytes = [0xC7, 0x45, 0xE8, 0xC4, 0x09, 0x00, 0x00, 0xEB, 0x06, 0x90, 0x90, 0x90, 0x90, 0x90, 0x90]
