# Semi-Transparent Letterbox for KOTOR II Steam/Aspyr
#
# Porting note:
#   The KOTOR 1 patch changes three immediate PUSH 1.0f sites in
#   CSWGuiDialogLetterbox to PUSH 0.5f.  KOTOR II Aspyr uses x87 code
#   and stores the active letterbox alpha in [this + 0x50].  The equivalent
#   patch replaces the opaque-alpha setup paths with direct writes of 0.5f
#   and scales the Draw() transition alpha by 0.5 before it is stored.
#
# Function anchors used for this version:
#   CSWGuiDialogLetterbox constructor post-ResetFade block: 0x008BAA5E-0x008BAA77
#   CSWGuiDialogLetterbox::ResetFade opaque path:          0x008BB043-0x008BB09E
#   CSWGuiDialogLetterbox::SetFade fade-in/opaque path:    0x008BB108-0x008BB165
#   CSWGuiDialogLetterbox::Draw transition alpha store:    0x008BB3C3-0x008BB3CB
#   0.5f constant reused by Draw():                        0x0098C014
#
# All hooks are REPLACE hooks. KPM appends the return jump automatically,
# except hook 3 intentionally performs an absolute jump to the common
# SetFade continuation so the fade-out/zero-alpha path remains untouched.

[[hooks]]
address = 0x008BAA5E
type = "replace"
# Constructor: after ResetFade(), initialize current alpha to 0.5f while
# preserving the original writes that clear [this+0x88] and [this+0x8C].
# File offset: 0x004B9E5E
original_bytes = [
    0x8B, 0x55, 0xE8, 0xC7, 0x82, 0x88, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
    0x00, 0x8B, 0x45, 0xE8, 0xC7, 0x80, 0x8C, 0x00, 0x00, 0x00, 0x00, 0x00,
    0x00, 0x00
]
replacement_bytes = [
    0x8B, 0x55, 0xE8, 0xC7, 0x42, 0x50, 0x00, 0x00, 0x00, 0x3F, 0xC7, 0x82,
    0x88, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x8B, 0x45, 0xE8, 0xC7,
    0x80, 0x8C, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00
]

[[hooks]]
address = 0x008BB043
type = "replace"
# ResetFade: replace the non-hidden/opaque branch with alpha = 0.5f.
# Execution resumes at 0x008BB09F. File offset: 0x004BA443
original_bytes = [
    0xD9, 0xE8, 0xDC, 0x1D, 0x50, 0x6B, 0x98, 0x00, 0xDF, 0xE0, 0xF6, 0xC4,
    0x05, 0x7A, 0x07, 0xD9, 0xE8, 0xD9, 0x5D, 0xEC, 0xEB, 0x05, 0xD9, 0xE8,
    0xD9, 0x5D, 0xEC, 0xD9, 0x45, 0xEC, 0xDC, 0x1D, 0x38, 0x6B, 0x98, 0x00,
    0xDF, 0xE0, 0xF6, 0xC4, 0x41, 0x75, 0x23, 0xD9, 0xE8, 0xDC, 0x1D, 0x50,
    0x6B, 0x98, 0x00, 0xDF, 0xE0, 0xF6, 0xC4, 0x05, 0x7A, 0x07, 0xD9, 0xE8,
    0xD9, 0x5D, 0xE8, 0xEB, 0x05, 0xD9, 0xE8, 0xD9, 0x5D, 0xE8, 0xD9, 0x45,
    0xE8, 0xD9, 0x5D, 0xE4, 0xEB, 0x05, 0xD9, 0xEE, 0xD9, 0x5D, 0xE4, 0x8B,
    0x55, 0xFC, 0xD9, 0x45, 0xE4, 0xD9, 0x5A, 0x50
]
replacement_bytes = [
    0x8B, 0x45, 0xFC, 0xC7, 0x40, 0x50, 0x00, 0x00, 0x00, 0x3F
]

[[hooks]]
address = 0x008BB108
type = "replace"
# SetFade: replace the fade-in/opaque branch with alpha = 0.5f, then jump
# to the common continuation at 0x008BB1C2. The fade-out branch at
# 0x008BB166 is not overwritten. File offset: 0x004BA508
original_bytes = [
    0xD9, 0xE8, 0xDC, 0x1D, 0x50, 0x6B, 0x98, 0x00, 0xDF, 0xE0, 0xF6, 0xC4,
    0x05, 0x7A, 0x07, 0xD9, 0xE8, 0xD9, 0x5D, 0xF8, 0xEB, 0x05, 0xD9, 0xE8,
    0xD9, 0x5D, 0xF8, 0xD9, 0x45, 0xF8, 0xDC, 0x1D, 0x38, 0x6B, 0x98, 0x00,
    0xDF, 0xE0, 0xF6, 0xC4, 0x41, 0x75, 0x23, 0xD9, 0xE8, 0xDC, 0x1D, 0x50,
    0x6B, 0x98, 0x00, 0xDF, 0xE0, 0xF6, 0xC4, 0x05, 0x7A, 0x07, 0xD9, 0xE8,
    0xD9, 0x5D, 0xF4, 0xEB, 0x05, 0xD9, 0xE8, 0xD9, 0x5D, 0xF4, 0xD9, 0x45,
    0xF4, 0xD9, 0x5D, 0xF0, 0xEB, 0x05, 0xD9, 0xEE, 0xD9, 0x5D, 0xF0, 0x8B,
    0x4D, 0xFC, 0xD9, 0x45, 0xF0, 0xD9, 0x59, 0x50, 0xEB, 0x5C
]
replacement_bytes = [
    0x8B, 0x45, 0xFC, 0xC7, 0x40, 0x50, 0x00, 0x00, 0x00, 0x3F, 0xB8, 0xC2,
    0xB1, 0x8B, 0x00, 0xFF, 0xE0
]

[[hooks]]
address = 0x008BB3C3
type = "replace"
# Draw: during active transitions, KOTOR II recomputes [this+0x50] from
# a 0.0-1.0 interpolation. Multiply that value by the existing 0.5f
# constant before storing it, so fades peak at the same semi-transparent
# alpha as the steady-state paths. Execution resumes at 0x008BB3CC.
# File offset: 0x004BA7C3
original_bytes = [
    0x8B, 0x4D, 0xCC, 0xD9, 0x45, 0xB0, 0xD9, 0x59, 0x50
]
replacement_bytes = [
    0x8B, 0x4D, 0xCC, 0xD9, 0x45, 0xB0, 0xD8, 0x0D, 0x14, 0xC0, 0x98, 0x00,
    0xD9, 0x59, 0x50
]
