# KOTOR 2 GOG/Aspyr
#
# Hook site:
#   CSWSCombatRound::CalculateOnHandAttacks(unsigned short), function tail.
#
# Vanilla sequence at this site:
#   mov eax, [ebp - 0x18]         ; CSWSCombatRound *this
#   mov eax, [eax + 0x0AE0]       ; return on_hand_attacks
#
# Replacement behavior:
#   1. Load the main-hand item from creature->inventory slot 0x10.
#   2. Call CSWItem::GetBaseItem().
#   3. If CSWBaseItem::weapon_wield == 6, increment this->on_hand_attacks.
#   4. Return this->on_hand_attacks in EAX, then KPM jumps back to the
#      original epilogue at hook + len(original_bytes).
#
# Constants:
#   CSWSCombatRound::player_creature = this + 0x0B04
#   CSWSCombatRound::on_hand_attacks = this + 0x0AE0
#   CSWSCreature::inventory         = creature + 0x1150
#   CSWBaseItem::weapon_wield       = baseitem + 0x08
#   CSWInventory::GetItemInSlot     = 0x0067A5B0
#   CSWItem::GetBaseItem            = 0x004ECC00

