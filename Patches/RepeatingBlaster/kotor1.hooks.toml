# KOTOR 1 / 1.03
#
# Reworks the old double-weapon/off-hand repeater hook into a main-hand bonus.
# This is the same original site used by the existing RepeatingBlaster patch:
# CSWSCombatRound::CalculateOffHandAttacks, at the double-weapon
# weapon_wield == 3 check.
#
# Behavior:
#   weapon_wield == 3: fall through to the original double-weapon off-hand path.
#   weapon_wield == 6: increment CSWSCombatRound::on_hand_attacks at this + 0x990,
#                      then skip the original off-hand assignment.
#   otherwise:         skip the original off-hand assignment.
#
# Register note:
#   The K1 optimized function keeps the CSWSCombatRound pointer in ESI at this
#   site; EAX is the CSWBaseItem pointer already being checked by vanilla code.

[[hooks]]
address = 0x004D2B16
type = "replace"
# Original: cmp byte ptr [eax + CSWBaseItem::weapon_wield], 3; jne 0x004D2B21
original_bytes = [
    0x80, 0x78, 0x08, 0x03, 0x75, 0x05
]
replacement_bytes = [
    0x80, 0x78, 0x08, 0x03, 0x74, 0x12, 0x80, 0x78, 0x08, 0x06, 0x75, 0x06,
    0xFF, 0x86, 0x90, 0x09, 0x00, 0x00, 0x68, 0x21, 0x2B, 0x4D, 0x00, 0xC3
]
