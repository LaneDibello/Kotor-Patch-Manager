# KOTOR2 GOG Aspyr dynamic-light 9-light patch with skinned-safe VertexProgram gate.
# Addresses are VA-style. No manifest conflicts.
#
# Effect:
#   - LightManager/scene caps: 3 -> 9
#   - VertexProgram + 0x2010:
#       skinned/bone-palette VP source -> 3
#       other VP source                -> 9
#   - generated VP source allocation: 0x1000 -> 0x4000
#
# This avoids the confirmed player/creature vertex warping caused by letting
# skinned VP light constants overlap program.env[18..68] bone matrices.

# LightManager::maxLights global
[[hooks]]
address = 0x00A0FB64
type = "simple"
original_bytes = [0x03, 0x00, 0x00, 0x00]
replacement_bytes = [0x09, 0x00, 0x00, 0x00]

# LightManager::PrioritizeIllumination loop cap
[[hooks]]
address = 0x009006DC
type = "simple"
original_bytes = [0x83, 0x7D, 0xF0, 0x03]
replacement_bytes = [0x83, 0x7D, 0xF0, 0x09]

