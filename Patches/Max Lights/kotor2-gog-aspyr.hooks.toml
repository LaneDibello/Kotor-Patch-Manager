# VertexProgram::VertexProgram safe 3/9 gate
# Replaces stock: mov dword ptr [this + 0x2010], 3
# The replacement scans the source string for "boneArray" or "skinned" and
# also checks the dynamic generated skinned-source pointer at [0x00A74DD4].
