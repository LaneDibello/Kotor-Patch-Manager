# Keep Bink movies in the current game window instead of switching to 640x480 movie mode.
[[hooks]]
address = 0x00403D38
type = "simple"
original_bytes = [0xC7, 0x05, 0xBC, 0x3C, 0x7A, 0x00, 0x01, 0x00, 0x00, 0x00]
replacement_bytes = [0xC7, 0x05, 0xBC, 0x3C, 0x7A, 0x00, 0x00, 0x00, 0x00, 0x00]

# Resume the game window after the movie tears down so mouse and keyboard input keep working.
[[hooks]]
address = 0x00404C10
type = "detour"
function = "postMovieCleanup"
original_bytes = [0x89, 0x7E, 0x24, 0x5F, 0x5E]
exclude_from_restore = []

# Replace the final Bink offset call with aspect-preserving scale and centering.
[[hooks]]
address = 0x00405855
type = "detour"
function = "applyMovieAspectScale"
original_bytes = [
    0x8B, 0x8E, 0x88, 0x00, 0x00, 0x00,
    0x8B, 0x96, 0x84, 0x00, 0x00, 0x00,
    0x8B, 0x46, 0x4C,
    0x51, 0x52, 0x50,
    0xFF, 0x15, 0x80, 0xD4, 0x73, 0x00
]
skip_original_bytes = true
exclude_from_restore = []

[[hooks.parameters]]
source = "esi"
type = "pointer"
